name: Build SnoahTune APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7 --distribution-type bin

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK with commit SHA
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          cp app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/SnoahTune-debug-${SHORT_SHA}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SnoahTune-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/SnoahTune-debug-*.apk
          retention-days: 30

      - name: Build Summary
        run: |
          echo "✅ SnoahTune APK built successfully!"
          echo ""
          echo "📦 Artifact: SnoahTune-debug-${{ github.sha }}"
          echo "🔖 Commit:   ${{ env.SHORT_SHA }} (${{ github.ref_name }})"
          echo "📥 Download: Go to Actions → this run → Artifacts section"
          echo ""
          ls -lh app/build/outputs/apk/debug/SnoahTune-debug-*.apk
